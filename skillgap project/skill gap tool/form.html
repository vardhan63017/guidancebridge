<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guidance Bridge - Sign In / Register</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* --- COLOR PALETTE (Matching Light Theme) --- */
      :root {
        --bg-light: #f8f9fa;
        --primary-dark: #192a56; /* Deep Navy Blue */
        --accent-blue: #007bff; /* Bright Blue */
        --accent-yellow: #ffc107;
        --text-dark: #212529;
        --shadow-light: rgba(0, 0, 0, 0.15);
        --gradient-start: #e0f2f7; /* Very light blue */
        --gradient-end: #f0f8fa; /* Slightly lighter gray-blue */
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        color: var(--text-dark);
        text-align: center;
        min-height: 100vh;
        display: flex; /* Use flexbox for layout */
        flex-direction: column; /* Stack navbar and container */

        /* 1. Linear Gradient Background */
        background: linear-gradient(
          135deg,
          var(--gradient-start) 0%,
          var(--gradient-end) 100%
        );
        background-attachment: fixed; /* Ensures gradient covers full scrollable area */
      }

      /* --- Navbar (Role Selector) STYLES --- */
      .navbar {
        display: flex;
        justify-content: center;
        background: #ffffff;
        padding: 15px;
        box-shadow: 0 2px 10px var(--shadow-light);
        /* Consistent with main site navbar - subtle blur */
        backdrop-filter: blur(5px);
        opacity: 0.98;
        z-index: 10; /* Ensure it's above the main content */

        /* ADDED: Logo for branding */
        position: relative; /* For absolute positioning of logo if desired */
      }

      /* ADDED: Guidance Bridge Logo in Navbar */
      .navbar-logo {
        position: absolute;
        left: 20px; /* Adjust as needed */
        top: 50%;
        transform: translateY(-50%);
        font-weight: 800;
        font-size: 1.2rem;
        color: var(--primary-dark);
        text-decoration: none;
        display: flex;
        align-items: center;
      }
      .navbar-logo i {
        margin-right: 8px;
        color: var(--accent-blue);
      }

      .nav-item {
        margin: 0 15px;
        cursor: pointer;
        font-weight: 700;
        color: var(--primary-dark);
        padding: 8px 16px;
        border-radius: 6px;
        transition: all 0.3s ease-in-out; /* Smoother transitions */
        font-size: 1rem;
      }

      .nav-item:hover {
        background: #e9ecef;
        transform: translateY(-2px); /* More pronounced lift */
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .nav-item.active {
        border-bottom: 3px solid var(--accent-blue);
        padding-bottom: 5px;
        color: var(--accent-blue);
        background: #e0f2f7; /* Slight highlight on active tab */
        box-shadow: 0 2px 8px rgba(0, 123, 255, 0.1);
      }

      /* --- CONTAINER & FORM BOX --- */
      .container {
        flex-grow: 1; /* Allows container to take remaining space */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px; /* Add padding for smaller screens */
      }

      .form-box {
        background: white;
        color: var(--text-dark);
        padding: 40px; /* Slightly more padding */
        border-radius: 16px; /* Slightly rounder corners */
        width: 420px; /* Slightly wider */
        max-width: 90%; /* Responsive width */
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25); /* More attractive, deeper shadow */
        border: 1px solid #e0e0e0; /* Cleaner border */
        text-align: left;
        transition: transform 0.4s ease, box-shadow 0.4s ease; /* Smoother transitions */
      }

      .form-box:hover {
        transform: translateY(-5px); /* More noticeable lift on hover */
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35); /* Deeper shadow on hover */
      }

      .form-box h2 {
        text-align: center;
        margin-bottom: 30px; /* More space below heading */
        color: var(--primary-dark);
        font-weight: 800;
        font-size: 2rem; /* Larger heading */
      }

      .form-group {
        margin-bottom: 20px; /* More space between form groups */
      }

      .form-group label {
        display: block;
        margin-bottom: 8px; /* More space between label and input */
        font-weight: 600;
        color: var(--text-dark);
      }

      .form-group input[type="text"],
      .form-group input[type="email"],
      .form-group input[type="password"] {
        width: 100%;
        padding: 12px 15px; /* More padding for better touch targets */
        border: 1px solid #c9d2d9; /* Softer border color */
        border-radius: 8px; /* Slightly rounder inputs */
        box-sizing: border-box;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
        font-size: 1rem;
      }

      .form-group input[type="file"] {
        width: 100%;
        padding: 12px 0; /* Padding for file input */
        font-size: 0.95rem;
        color: #555;
      }

      .form-group input:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.3); /* Larger, more attractive glow */
        outline: none;
        background-color: #f9fcff; /* Very subtle background change on focus */
      }

      /* --- BUTTON STYLES (Dark Button on Light BG) --- */
      .btn {
        width: 100%;
        padding: 14px; /* Larger buttons */
        background: var(--primary-dark);
        color: white;
        border: none;
        border-radius: 8px; /* Rounder buttons */
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease-in-out; /* Smoother transitions */
        font-size: 1.1rem; /* Larger font for buttons */
        box-shadow: 0 5px 15px rgba(25, 42, 86, 0.2);
      }

      .btn:hover {
        background: #2c447a; /* Darker blue on hover */
        box-shadow: 0 8px 20px rgba(25, 42, 86, 0.3); /* Deeper shadow on hover */
        transform: translateY(-2px);
      }

      .toggle-link {
        text-align: center;
        margin-top: 25px; /* More space above the link */
        font-size: 0.95rem;
      }

      .toggle-link a {
        color: var(--accent-blue);
        text-decoration: none;
        font-weight: bold;
        transition: color 0.2s;
      }

      .toggle-link a:hover {
        text-decoration: underline;
        color: #0056b3; /* Slightly darker blue on hover */
      }

      /* Success message styling */
      .success-message {
        background-color: #d4edda;
        color: #155724;
        padding: 12px;
        border-radius: 4px;
        margin-top: 20px;
        display: none;
        text-align: center;
      }

      /* View Users button */
      .view-users-btn {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        background-color: var(--accent-blue);
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        width: fit-content;
      }

      .view-users-btn:hover {
        background-color: #0056b3;
      }

      /* --- Responsive Adjustments --- */
      @media (max-width: 576px) {
        .form-box {
          padding: 30px 20px;
          width: 95%;
        }
        .form-box h2 {
          font-size: 1.7rem;
        }
        .nav-item {
          margin: 0 8px;
          font-size: 0.9rem;
          padding: 6px 10px;
        }
        .navbar-logo {
          left: 10px;
          font-size: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <a href="index.html" class="navbar-logo">
        <i class="fas fa-graduation-cap"></i> Guidance Bridge
      </a>
      <div
        class="nav-item active"
        data-section="learner"
        onclick="showSection('learner')"
      >
        Learner
      </div>
      <div
        class="nav-item"
        data-section="student"
        onclick="showSection('student')"
      >
        College Mentor
      </div>
      <div
        class="nav-item"
        data-section="developer"
        onclick="showSection('developer')"
      >
        Professional Mentor
      </div>
    </div>

    <div class="container">
      <div class="form-box" id="formBox"></div>
    </div>

    <script>
      // Set the default section on load
      document.addEventListener("DOMContentLoaded", () => {
        showSection("learner");
      });

      // Function to clear the active state from all nav items
      function clearActive() {
        document
          .querySelectorAll(".nav-item")
          .forEach((item) => item.classList.remove("active"));
      }

      // Function to update the form box and active nav item
      function showSection(section) {
        clearActive();
        document
          .querySelector(`.nav-item[data-section="${section}"]`)
          .classList.add("active");

        const formBox = document.getElementById("formBox");
        let formHTML = "";

        if (section === "learner") {
          formHTML = `
                    <h2>Learner Login</h2>
                    <form id="learnerLoginForm">
                      <div class="form-group">
                          <label>Email</label>
                          <input type="email" id="learnerEmail" placeholder="Enter email" required>
                      </div>
                      <div class="form-group">
                          <label>Password</label>
                          <input type="password" id="learnerPassword" placeholder="Enter password" required>
                      </div>
                      <button type="submit" class="btn">Login</button>
                    </form>
                    <div class="toggle-link">
                        New User? <a href="#" onclick="toggleForm('learnerSignup')">Signup</a>
                    </div>
                `;
        } else if (section === "student") {
          formHTML = `
                    <h2>College Mentor Login</h2>
                    <form id="studentLoginForm">
                      <div class="form-group">
                          <label>Email</label>
                          <input type="email" id="studentEmail" placeholder="Enter college email" required>
                      </div>
                      <div class="form-group">
                          <label>Password</label>
                          <input type="password" id="studentPassword" placeholder="Enter password" required>
                      </div>
                      <button type="submit" class="btn">Login</button>
                    </form>
                    <div class="toggle-link">
                        New Mentor? <a href="#" onclick="toggleForm('studentSignup')">Signup</a>
                    </div>
                `;
        } else if (section === "developer") {
          formHTML = `
                    <h2>Professional Mentor Login</h2>
                    <form id="developerLoginForm">
                      <div class="form-group">
                          <label>Email</label>
                          <input type="email" id="developerEmail" placeholder="Enter professional email" required>
                      </div>
                      <div class="form-group">
                          <label>Password</label>
                          <input type="password" id="developerPassword" placeholder="Enter password" required>
                      </div>
                      <button type="submit" class="btn">Login</button>
                    </form>
                    <div class="toggle-link">
                        New Professional? <a href="#" onclick="toggleForm('developerSignup')">Signup</a>
                    </div>
                `;
        }

        formBox.innerHTML = formHTML;

        // Add form submission handlers
        if (section === "learner") {
          document
            .getElementById("learnerLoginForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleLogin("learner");
            });
        } else if (section === "student") {
          document
            .getElementById("studentLoginForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleLogin("student");
            });
        } else if (section === "developer") {
          document
            .getElementById("developerLoginForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleLogin("developer");
            });
        }
      }

      // Function to toggle between Login and Signup forms for each role
      function toggleForm(type) {
        const formBox = document.getElementById("formBox");
        let formHTML = "";

        if (type === "learnerSignup") {
          formHTML = `
                    <h2>Learner Signup</h2>
                    <form id="learnerSignupForm">
                      <div class="form-group">
                          <label>Full Name</label>
                          <input type="text" id="learnerName" placeholder="Enter full name" required>
                      </div>
                      <div class="form-group">
                          <label>Area of Interest</label>
                          <input type="text" id="learnerInterest" placeholder="e.g., Engineering, Business, Design" required>
                      </div>
                      <div class="form-group">
                          <label>Email</label>
                          <input type="email" id="learnerSignupEmail" placeholder="Enter email" required>
                      </div>
                      <div class="form-group">
                          <label>Password</label>
                          <input type="password" id="learnerSignupPassword" placeholder="Create password" required>
                      </div>
                      <button type="submit" class="btn">Submit</button>
                    </form>
                    <div id="successMessage" class="success-message"></div>
                    <div class="toggle-link">
                        Already a user? <a href="#" onclick="showSection('learner')">Login</a>
                    </div>
                `;
        } else if (type === "studentSignup") {
          formHTML = `
                    <h2>College Mentor Signup</h2>
                    <form id="studentSignupForm">
                      <div class="form-group">
                          <label>Full Name</label>
                          <input type="text" id="studentName" placeholder="Enter full name" required>
                      </div>
                      <div class="form-group">
                          <label>College Email</label>
                          <input type="email" id="studentEmail" placeholder="Enter college email for verification" required>
                      </div>
                      <div class="form-group">
                          <label>CGPA</label>
                          <input type="text" id="studentCGPA" placeholder="Enter current CGPA" required>
                      </div>
                      <div class="form-group">
                          <label>Resume (for Admin Verification)</label>
                          <input type="file" id="studentResume">
                      </div>
                      <button type="submit" class="btn">Submit for Verification</button>
                    </form>
                    <div id="successMessage" class="success-message"></div>
                    <div class="toggle-link">
                        Already registered? <a href="#" onclick="showSection('student')">Login</a>
                    </div>
                `;
        } else if (type === "developerSignup") {
          formHTML = `
                    <h2>Professional Mentor Signup</h2>
                    <form id="developerSignupForm">
                      <div class="form-group">
                          <label>Full Name</label>
                          <input type="text" id="developerName" placeholder="Enter full name" required>
                      </div>
                      <div class="form-group">
                          <label>Professional Email</label>
                          <input type="email" id="developerEmail" placeholder="Enter professional email for verification" required>
                      </div>
                      <div class="form-group">
                          <label>Company Name</label>
                          <input type="text" id="developerCompany" placeholder="Enter current company name" required>
                      </div>
                      <div class="form-group">
                          <label>Designation/Package</label>
                          <input type="text" id="developerPackage" placeholder="Enter role and package (e.g., SDE II, 15L)" required>
                      </div>
                      <button type="submit" class="btn">Submit for Verification</button>
                    </form>
                    <div id="successMessage" class="success-message"></div>
                    <div class="toggle-link">
                        Already registered? <a href="#" onclick="showSection('developer')">Login</a>
                    </div>
                `;
        }
        formBox.innerHTML = formHTML;

        // Add form submission handlers
        if (type === "learnerSignup") {
          document
            .getElementById("learnerSignupForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleSignup("learner");
            });
        } else if (type === "studentSignup") {
          document
            .getElementById("studentSignupForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleSignup("student");
            });
        } else if (type === "developerSignup") {
          document
            .getElementById("developerSignupForm")
            .addEventListener("submit", function (e) {
              e.preventDefault();
              handleSignup("developer");
            });
        }
      }

      // Handle login actions
      function handleLogin(type) {
        // For learner login, redirect to index.html
        if (type === "learner") {
          window.location.href = "mentorlist.html";
        } else {
          alert(
            `${
              type.charAt(0).toUpperCase() + type.slice(1)
            } login functionality would be implemented here`
          );
          // In a real application, this would validate credentials against a database
        }
      }

      // Handle signup form submissions
      function handleSignup(type) {
        let userData = {};

        if (type === "learner") {
          userData = {
            role: "Learner",
            name: document.getElementById("learnerName").value,
            interest: document.getElementById("learnerInterest").value,
            email: document.getElementById("learnerSignupEmail").value,
            timestamp: new Date().toLocaleString(),
          };
        } else if (type === "student") {
          userData = {
            role: "College Mentor",
            name: document.getElementById("studentName").value,
            email: document.getElementById("studentEmail").value,
            cgpa: document.getElementById("studentCGPA").value,
            timestamp: new Date().toLocaleString(),
          };
        } else if (type === "developer") {
          userData = {
            role: "Professional Mentor",
            name: document.getElementById("developerName").value,
            email: document.getElementById("developerEmail").value,
            company: document.getElementById("developerCompany").value,
            package: document.getElementById("developerPackage").value,
            timestamp: new Date().toLocaleString(),
          };
        }

        // Store data in localStorage
        storeUserData(userData);

        // Redirect to index.html after a brief delay to show success message
        const successMessage = document.getElementById("successMessage");
        successMessage.textContent =
          "Thank you for registering! Redirecting to home page...";
        successMessage.style.display = "block";

        setTimeout(() => {
          window.location.href = "mentorlist.html";
        }, 1500);
      }

      // Store user data in localStorage
      function storeUserData(userData) {
        // Get existing users or initialize empty array
        const users =
          JSON.parse(localStorage.getItem("guidanceBridgeUsers")) || [];

        // Add new user
        users.push(userData);

        // Save back to localStorage
        localStorage.setItem("guidanceBridgeUsers", JSON.stringify(users));
      }
    </script>
  </body>
</html>
