<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle Buttons</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470?ixlib=rb-4.0.3&auto=format&fit=crop&w=1950&q=80")
          no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
      }

      .container {
        display: flex;
        gap: 60px;
        background: rgba(0, 0, 0, 0.5);
        padding: 30px 50px;
        border-radius: 15px;
      }

      .circle-btn {
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: linear-gradient(145deg, #ff0000, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 64px;
        font-weight: bold;
        color: #fff;
        border: none;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .circle-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      }

      .label {
        text-align: center;
        margin-top: 10px;
        font-size: 14px;
        font-weight: bold;
        color: white;
      }

      .btn-wrapper {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="btn-wrapper">
        <button class="circle-btn" onclick="window.open( 'ssra.html');">
          S
        </button>
        <div class="label">STUDENT SUGGESTIONS</div>
      </div>
      <div class="btn-wrapper">
        <button class="circle-btn" onclick="window.open( 'dra.html');">
          D
        </button>
        <div class="label">DEVELOPER</div>
      </div>
    </div>

    <script>
      // You can replace the URLs with your actual pages
      // "ssra" and "dra" are tab/window names
    </script>
  </body>
</html>
